1:`<div class="pass-title">When Maps were Made for the Public</div>
<div class="pass-body">
<p>Since the art of map-making began, maps have largely been made for explorers, academics and rulers. It wasn't until the 19th century that the general public began to demand maps for themselves. More than anything else, it was the appeal of travel to ordinary people that encouraged publishing companies to begin creating and printing more maps than ever before, in order to meet the demand of their new market.</p>
<p>In the years after the American Civil War (1861–65), the rapidly growing US railroad system had so many independent rail companies, schedules and destinations that maps were critical for planning a person's journey. One publisher, Rand McNally, made a fortune from producing railways maps for different parts of the USA, combined with a timetable and many descriptions of scenery and towns in the same booklet.</p>
<p>When safety improvements in the 1880s helped to make the bicycle popular, cycling maps quickly followed. Trying to provide something special, publisher George Philip produced attractive-looking maps that would remain in good condition even if they were exposed to water. In 1896, one of the finest cycling maps was produced, in seven parts: George Blum's <em>Cyclers' Guide and Road Book of California</em>. Each cycle road was highlighted in red and labelled with not only the type of surface riders could expect to find, but also an indication of how steep it was.</p>
<p>The advent of the car brought a need for road maps and travel information. In 1900, André Michelin published a guide about France, with maps that showed the location of different kinds of reasonably priced accommodation and also car assistance for any mechanical problems. However, it was due primarily to its recommendations regarding which was the best restaurant to go to that the guide quickly became something that a huge number of tourists and travellers bought and relied on.</p>
<p>Nowhere was the need for road maps greater than in the United States. In 1902, the American Automobile Association was founded in Chicago, and three years later it published its first road maps for long-distance drivers. In 1917, Rand McNally began to publish <em>Auto Trails Maps</em>, a series of maps that each focussed in detail on a different region that people might hope to visit within North America. The same publisher also helped to establish the US's system of identifying its roads. Previously roads had names, following the European tradition, but now, thanks in part to Rand McNally, they were allocated numbers instead. Also in the early twentieth century, publisher H. M. Gousha Company developed the <em>Touraide</em>, a set of spiral-bound maps with places to stay and eat and points of interest, ordered in advance and assembled individually for the traveller.</p>
<p>The oil companies did not take long to realize the profit to be made from Americans exploring the open road, so service stations soon began to distribute free maps to encourage this. Free road maps became part of the fabric of American life, and it has been estimated that more than ten billion were distributed before the 1970s. It was then that the rising costs of oil and subsequent falling consumption led to the oil companies investigating where savings could be made. The maps were one of the first things to go.</p>
<p>Another map product was the aeronautical chart for pilots. The first examples were produced in France and England around 1911. Techniques progressed greatly during World War 1, and during the 1920s there was continual development of maps for air navigation.</p>
<p>New maps also became available for those who only wanted to cross town by train. Some of the early maps of the London Underground were based on the city above ground; therefore, although they were accurate in terms of distance and direction, the maps were confusing because the stations in central London were so crowded together. In 1931, Harry Beck produced a map that looked rather like an electrical circuit, with straight lines and symbols. It included only one feature above ground: the river Thames. The stations were also spaced relatively equally, making the map much easier to read. Although Beck's map was initially rejected as too radical, it was approved in 1933. He continued to refine it for the next 25 years.</p>
<p>Shortly after Beck's contribution to the mapping of subterranean London, an equally significant achievement was performed above ground. Phyllis Pearsall was a painter who, in 1935, became lost on the way to a party in London, due to the lack of a good map. This inspired her to plot all of London, and the next year she traced and catalogued its 23,000 streets. With map-maker James Duncan, Pearsall then produced an atlas and a comprehensive street index. Unable to interest any of the major publishers, the two founded their own company, the Geographer's Map Company Ltd, and produced what was then called the <em>A–Z Atlas and Guide to London</em>. The company still exists and now publishes more than 300 different A–Z maps and atlases.</p>
</div>`,
2:`<div class="pass-title">Preserving Antarctic History</div>
<div class="pass-sub">Protecting early buildings in Antarctica</div>
<div class="pass-body">
<p><span class="para-letter">A</span>Few people conjuring up the 'most comfortable dwelling place imaginable' are likely to picture a wooden shelter on an island off the coldest continent on Earth. But that's how Antarctic explorer Robert Falcon Scott described the hut at Cape Evans on Ross Island that was the base for his 1910–13 expedition. The hut is nestled below a small hill on a long stretch of black sand. In 2011, it looked like a building site, but now, seals lie on the ice in front of the newly restored structure and sun reflects off the cliffs of the nearby glacier.</p>
<p><span class="para-letter">B</span>The New Zealand Antarctic Heritage Trust (NZAHT) and its team of conservation workers recently announced the completion of 10 years of intensive work to save three historic buildings on Ross Island. As well as the hut at Cape Evans, it has worked on the Discovery Hut from Scott's 1901–04 expedition at Hut Point, and the hut at Cape Royds, built for Ernest Shackleton's 1907–09 expedition. When work began, many of the artefacts were temporarily removed while carpenters from the team of conservation workers repaired the walls, floors and roof. In Scott's 'zone of command' was the table where team member Edward Wilson made his enduring biological and botanical illustrations. In a dark corner nearby, Edward Atkinson had once incubated his moulds and parasites. Of particular interest is the small workbench and array of test tubes, sample jars and Bunsen burner stands of biologist Edward Nelson, lit by sunshine through a dusty window. This was where the young scientist preserved marine specimens as part of his search for new species and an understanding of the Antarctic food chain.</p>
<p><span class="para-letter">C</span>The NZAHT executive director Nigel Watson describes the three restored huts as 'fantastic remnants of humans' first contact with the continent'. The idea for the birth of the conservation project, he says, 'was the fact that we were in great danger of losing them'. When the on-site work began in 2004, snow and ice were building up around, under and sometimes inside the huts, damaging the structures and threatening their contents. 'We now have three buildings that are structurally sound and watertight with a very different feel – they are drier and lighter and the humidity is reduced. It's a much better environment for the collection.'</p>
<p><span class="para-letter">D</span>As well as heritage carpenters, the NZAHT team on Ross Island has included experts in textile, paper and metal conservation: in total, 62 experts from 11 countries have visited Antarctica to work on the project, often spending a whole summer on-site, sleeping in tents and popping 25km back to Scott Base for the occasional shower. 'It became known as the most exciting conservation project in the world,' says Watson, 'so it attracted top heritage conservation talent.'</p>
<p><span class="para-letter">E</span>Some of the most exciting discoveries were three intact crates of 'Mackinlay's Rare Old Highland Malt Whisky' found encased in ice beneath Shackleton's hut, a paper notebook that belonged to surgeon, zoologist and photographer George Murray Levick found buried in dirt at Cape Evans and a small box of 22 cellulose nitrate negatives waiting to be developed into photographs found in Herbert Ponting's darkroom. But most of the 18,202 items catalogued and conserved are more mundane: food, tools, clothing and other personal items that were not precious enough to be taken home on the return voyages.</p>
<p><span class="para-letter">F</span>The NZAHT team's conservation treatments involved thorough cleaning, followed by chemical treatment to help slow, or even reverse, the deterioration. Metal items would go through corrosion removal, followed by a chemical stabilisation treatment, then application of an oxygen and moisture barrier to prevent further corrosion. Treatment of paper items often involved washing to remove harmful acids and salts and to help reinforce the fibres so that in some cases the paper was even stronger than before.</p>
<p><span class="para-letter">G</span>As a result of the project, the NZAHT has become the world leader in cold-climate heritage conservation and its members have been interviewed for numerous television documentaries and radio reports. The Ross Island huts are the 'jewels in the crown', says Watson, but there are other historic buildings needing attention. With logistics support from <em>Antarctica New Zealand</em>, programme managers Al Fastier and Lizzie Meek will be part of a small team heading to Cape Adare, an exposed site more than 700km north of Scott Base. The two Cape Adare huts, remnants of an 1898–1900 British expedition, 'are not only the first buildings on the continent', says Watson, but also 'the only example of humanity's first buildings on any continent on Earth'.</p>
<p><span class="para-letter">H</span>The three-year restoration effort will involve construction repairs and the removal, conservation and return of about 1100 objects. Compared with the hut sites on Ross Island, which are relatively sheltered, Cape Adare is 'a very remote and challenging place to work in', says Watson. It's set among the world's biggest colony of Adélie penguins on an exposed spit of land, and it is important that they don't interrupt the functioning of the colony in any way while they are there. Lizzie Meek looks forward to the challenge. 'But I'm also looking forward to going back to the Ross Island huts and seeing them with fresh eyes. After so many years of working on them, to be able to step inside and look around to see what we have accomplished will be amazing.'</p>
<p><span class="para-letter">I</span>If you can find your way to Antarctica, you'll need a permit to visit any of these huts, which are each in an Antarctic Specially Protected Area. But there's an easier way to see them without making the long journey: the trust has partnered with Google to offer Street View walkthroughs of each of the dwellings, available via Google Earth or through the NZAHT's website.</p>
</div>`,
3:`<div class="pass-title">Flower Power</div>
<div class="pass-body">
<p><span class="para-letter">A</span>Why do we give people flowers? To offer condolence to those who are grieving. To celebrate. To woo. To ask for forgiveness. We all know intuitively that there is something psychologically powerful about giving flowers; in fact, few objects provoke such a universal emotional response. In the US alone, the flower industry is now worth about $5bn a year – which suggests that, at the very least, they service a compelling human need.</p>
<p><span class="para-letter">B</span>Recent studies at the Department of Psychology at Rutgers State University of New Jersey investigated claims that flowers are unique among living organisms in their ability to induce profound changes in our emotional state. As the first part of their research, the Rutgers team visited 150 women in their homes. Each was presented with a variety of gifts such as flowers, fruit or sweets. The women were unaware that the study was about the effect of the flowers on their emotions. They were told that it was a study about their daily moods, and that they would receive a gift in return for taking part. Following the presentation of the gift, those receiving flowers were assessed as displaying a much more positive mood than those who got other gifts, and this effect lasted for several days. After receiving flowers, they were also more willing to answer questions concerning their social circle and intimate conversations with friends and family. The results suggest that flowers influence our secondary socio-emotional behaviours, as well as having a strong effect on our immediate emotional expression.</p>
<p><span class="para-letter">C</span>In the second study, the psychologists observed participants being handed single flowers, or alternative gifts, in a constrained and stressful situation – inside an elevator. Contrary to predictions regarding gender differences, both men and women presented with flowers were more likely to smile, to stand closer and to initiate conversation. Several subjects who were given the alternative gift then learnt that flowers were also being handed out, and returned to the elevator and demanded a flower. The scientists used elevators for this study precisely because the most typical behaviour in sparsely occupied elevators is for people to retreat to opposite corners. The subjects who received flowers, however, closed up that space to a considerable extent – indicating that the flowers not only induced a strong positive mood, but brought a significant affiliation among people who had never previously met.</p>
<p><span class="para-letter">D</span>The third study involved regularly sending flowers to a selected sample of men and women. The researchers found not only a profound elevation of mood, but also reliable improvements in other measures of cognitive function, like memory. In this series of experiments, some participants produced such extraordinary emotional displays that the psychologists were totally unprepared for them. Subjects gave spontaneous hugs and kisses to the people who delivered the flowers, and sent invitations to the psychologists to come to their homes for refreshments.</p>
<p><span class="para-letter">E</span>Various evolutionary hypotheses attempt to explain the remarkably powerful psychological effect of flowers. One is that our aesthetic preferences for fertile locations and growing things stem from prehistory, when these clues in our environment could mean the difference between starvation and survival. We may have become hardwired to respond positively to flowers because for early man, finding them in a particular location predicted future food supplies and possibly a better place to rear children. Yet the flaw in this argument is that the supplies and possibly a better place to rear children. Yet the flaw in this argument is that the showy flowers which humans seem to find most visually attractive are generally found on those plants which yield no edible products.</p>
<p><span class="para-letter">F</span>The Rutgers psychologists' findings show that the various physical attributes of flowers combine to directly affect our emotions through multi-channel interactions. We have evolved preferences for the particular colours, textures, patterned symmetries and specific floral odours which influence our moods. Indeed, previous research has established that popular perfumes, which often have a floral 'top-note', will actually reduce depression. The origins of these inclinations may well be as the evolutionary theories suggest: the patterned symmetries of flowers can be detected easily as a recognisable signal within a wide variety of visual arrays, and a response to certain colour tones is important in finding ripe fruit against a leafy background. But, claim the Rutgers team, these preferences have long been separated from their primary evolutionary use, and become rewarding to us more generally. Thus plants with preferred colours, shapes and odours – despite having no other products – would therefore be protected and dispersed.</p>
<p><span class="para-letter">G</span>The Rutgers study suggests that flowers may have actually evolved to exploit their peculiar impact on humans. The team's theory proposes a plant-human co-evolution, or even domestication, based on the intense emotional rewards that flowers provide. The idea that flowering plants, with no known food or other basic survival value to man, have co-evolved with us by exploiting an emotional niche instead, is very much like the scenario presented for the evolution of dogs. Flowers may be the plant equivalent of 'companion animals'. If this is true, then there is a very real sense in which, when you next give flowers, they are using you just as much as you are using them.</p>
</div>`
};

  sp.onclick=function(){this.outerHTML=this.innerHTML;};sp.title='Click to remove';
  try{hlRange.surroundContents(sp);}catch(ex){const f=hlRange.extractContents();sp.appendChild(f);hlRange.insertNode(sp);}
  hlTip.style.display='none';window.getSelection().removeAllRanges();
});

/* ============================================================
   RESIZABLE DIVIDER
============================================================ */
let drag=false,dStartX,dStartW;
const divEl=document.getElementById('divider'),ppEl=document.getElementById('ppane');
divEl.addEventListener('mousedown',e=>{drag=true;dStartX=e.clientX;dStartW=ppEl.offsetWidth;document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
document.addEventListener('mousemove',e=>{if(!drag)return;const tot=document.getElementById('main').offsetWidth-10;ppEl.style.width=Math.max(240,Math.min(tot-240,dStartW+(e.clientX-dStartX)))+'px';});
document.addEventListener('mouseup',()=>{drag=false;document.body.style.cursor='';document.body.style.userSelect='';});

/* ============================================================
   RESULTS
============================================================ */
function normalizeAns(v){
  const s=v.trim().toLowerCase();
  if(s==='true')return 't';
  if(s==='false')return 'f';
  if(s==='not given')return 'ngv';
  if(s==='yes')return 'yes';
  if(s==='no')return 'no';
  return s;
}
function isCorrect(n){return normalizeAns(ans[n]||'')===normalizeAns(AK[n].toString());}

function showResults(){
  const partNames={1:'Passage 1 – When Maps were Made for the Public (Q1–13)',2:'Passage 2 – Preserving Antarctic History (Q14–26)',3:'Passage 3 – Flower Power (Q27–40)'};
  let total=0,html='';
  for(let p=1;p<=3;p++){
    const[s,e]=pRanges[p];let pc=0,rows='';
    for(let i=s;i<=e;i++){
      const ok=isCorrect(i);if(ok){pc++;total++;}
      const ua=(ans[i]||'').trim()||'—';
      rows+=`<tr class="${ok?'rr-ok':'rr-no'}"><td><strong>${i}</strong></td><td>${ua}</td><td class="mc">${displayAK(i)}</td><td class="${ok?'mc':'mw'}">${ok?'✓':'✗'}</td></tr>`;
    }
    const tot2=e-s+1,pct=Math.round(pc/tot2*100),bc=pct>=70?'good':(pct>=50?'ok':'bad');
    html+=`<div class="rm-part"><div class="rm-ph">${partNames[p]}<span class="rm-badge ${bc}">${pc}/${tot2} (${pct}%)</span></div>
      <table class="rm-tbl"><thead><tr><th>Q</th><th>Your Answer</th><th>Correct</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }
  const pct=Math.round(total/40*100);
  const band=total>=39?'9.0':total>=37?'8.5':total>=35?'8.0':total>=33?'7.5':total>=30?'7.0':total>=27?'6.5':total>=23?'6.0':total>=19?'5.5':total>=15?'5.0':total>=13?'4.5':'4.0';
  html+=`<div class="total-strip"><span class="ts-lbl">Total Score</span><div><div class="ts-num">${total} / 40 <span style="font-size:14px;color:#888">(${pct}%)</span></div><div class="ts-band">Estimated Band Score: <strong>${band}</strong></div></div></div>`;
  document.getElementById('res-body').innerHTML=html;
  document.getElementById('res-overlay').style.display='flex';
}
function closeResults(){document.getElementById('res-overlay').style.display='none';}

/* ============================================================
   FONT SIZE
============================================================ */
let fsPass=14,fsQ=13;
const FS_MIN=10,FS_MAX=22;
function changeFontSize(which,delta){
  if(which==='pass'){fsPass=Math.max(FS_MIN,Math.min(FS_MAX,fsPass+delta));document.getElementById('fsz-pass-val').textContent=fsPass+'px';}
  else{fsQ=Math.max(FS_MIN,Math.min(FS_MAX,fsQ+delta));document.getElementById('fsz-q-val').textContent=fsQ+'px';}
  applyFontSizes();
}
function applyFontSizes(){
  const pp=document.getElementById('ppane');if(pp)pp.querySelectorAll('p').forEach(el=>el.style.fontSize=fsPass+'px');
  const qp=document.getElementById('qpane');if(qp)qp.style.fontSize=fsQ+'px';
}
function toggleMenu(){document.getElementById('menu-dropdown').classList.toggle('open');}
document.addEventListener('click',e=>{const w=document.getElementById('menu-wrap');if(w&&!w.contains(e.target))document.getElementById('menu-dropdown').classList.remove('open');});

goPart(1);
